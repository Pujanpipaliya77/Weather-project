<div class="space-y-4">
  <div class="flex items-center justify-between">
    <h3 class="text-xl font-bold text-white tracking-tight">7-Day Extended Forecast</h3>
    <span class="text-xs text-sky-200/50">Includes extrapolated days 6 & 7</span>
  </div>

  <!-- Responsive Layout: Grid on larger screens, scrollable list on mobile -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 lg:grid-cols-7 gap-4">
    <div 
      *ngFor="let day of forecastList"
      class="bg-slate-900/40 backdrop-blur-md rounded-2xl p-5 border shadow-md flex flex-col justify-between items-center text-center transition-all duration-300 hover:-translate-y-1 hover:bg-slate-900/60 hover:shadow-lg"
      [ngClass]="day.isExtrapolated ? 'border-amber-500/30 bg-amber-500/5' : 'border-white/10'"
    >
      
      <!-- Day Header -->
      <div>
        <p class="text-sm font-bold text-white tracking-wide" [class.text-sky-400]="day.dayName === 'Today'">
          {{ day.dayName }}
        </p>
        <p class="text-xs text-sky-200/60 font-medium mt-0.5">{{ day.date }}</p>
      </div>

      <!-- Icon -->
      <div class="my-3 relative flex items-center justify-center w-14 h-14 select-none">
        
        <!-- Custom Animated Spinning Sun (Clear Day) -->
        <div *ngIf="isClearSky(day.weatherIcon) && isDaytime(day.weatherIcon)" class="relative w-12 h-12 flex items-center justify-center">
          <!-- Sun Center -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6 text-amber-300 drop-shadow-[0_0_8px_rgba(251,191,36,0.9)] relative z-10">
            <circle cx="12" cy="12" r="5" />
          </svg>
          <!-- Spinning Rays -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" class="absolute w-10 h-10 text-amber-400 animate-[spin_20s_linear_infinite]">
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
        </div>

        <!-- Custom Animated Crescent Moon (Clear Night) -->
        <div *ngIf="isClearSky(day.weatherIcon) && !isDaytime(day.weatherIcon)" class="relative w-12 h-12 flex items-center justify-center">
          <!-- Moon -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-7 h-7 text-sky-100 drop-shadow-[0_0_10px_rgba(224,242,254,0.6)] relative z-10">
            <path d="M9.528 1.718a.75.75 0 0 1 .162.819A8.97 8.97 0 0 0 9 6a9 9 0 0 0 9 9 8.97 8.97 0 0 0 3.463-.69.75.75 0 0 1 .981.98 10.503 10.503 0 1 1-13.75-13.75.75.75 0 0 1 .834.178Z" />
          </svg>
          <!-- Stars -->
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="absolute top-1 right-1 w-2.5 h-2.5 text-yellow-200 animate-pulse">
            <path d="M12 .587l3.668 7.431 8.2 1.192-5.934 5.787 1.4 8.168L12 18.896l-7.334 3.854 1.4-8.168L.132 9.21l8.2-1.192L12 .587z" />
          </svg>
        </div>

        <!-- Fallback standard weather icon (clouds, rain, etc.) -->
        <img 
          *ngIf="!isClearSky(day.weatherIcon)"
          [src]="'https://openweathermap.org/img/wn/' + day.weatherIcon + '@2x.png'" 
          [alt]="day.weatherDesc"
          class="w-14 h-14 drop-shadow-sm select-none"
        />

        <!-- Extrapolated Badge -->
        <span 
          *ngIf="day.isExtrapolated" 
          class="absolute -top-1.5 -right-1.5 bg-amber-500 text-[8px] text-slate-950 font-bold px-1.5 py-0.5 rounded-full uppercase tracking-wider z-20"
          title="Extrapolated using recent forecast trends"
        >
          Ext
        </span>
      </div>

      <!-- Temp & Stats -->
      <div class="w-full space-y-3">
        <div>
          <p class="text-2xl font-black text-white tracking-tight">{{ day.tempAvg }}°</p>
          <p class="text-xs text-white/50 font-medium mt-0.5">{{ day.tempMax }}° / {{ day.tempMin }}°</p>
        </div>
        
        <!-- Detailed metrics per day -->
        <div class="pt-2 border-t border-white/5 grid grid-cols-2 gap-1 text-[10px] text-sky-100/60 font-semibold uppercase tracking-wider">
          <div class="flex flex-col items-center">
            <span>Hum</span>
            <span class="font-bold text-white text-xs mt-0.5">{{ day.humidityAvg }}%</span>
          </div>
          <div class="flex flex-col items-center">
            <span>Wind</span>
            <span class="font-bold text-white text-xs mt-0.5">{{ day.windSpeedAvg }}m/s</span>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>
